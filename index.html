<html>
<head>
	<meta charset="UTF-8">
	<title>Stupid Reverse Engineering Tool</title>
	<div class="loading">
		<p>Loading <code>capstone-arm.min.js</code>... (1.4mb)</p>
		<script src="capstone-arm.min.js"></script> Done.
		<p>Loading <code>keystone-arm.min.js</code>... (3.0mb)</p>
		<script src="keystone-arm.min.js"></script> Done.
		<p>Loading <code>unicorn-arm.min.js</code>... (2.3mb)</p>
		<script src="unicorn-arm.min.js"></script> Done.
	</div>
	<style>
		body {
			width: 100%;
			height: 100%;
			margin: 0px;
		}

		.loading {
			display: none;
		}

		textarea {
			resize: none;
			outline: none;	
			font-size: larger;
			box-sizing: border-box;
			position: absolute;
			border: none;
			tab-size: 4;
		}

		#bytes {
			top: 50px;
			right: 0px;
			height: 50%;
			width: 40%;
			background: lightgray;
		}

		#asm {
			top: 50px;
			left: 0px;
			height: calc(100% - 51px);
			width: 60%;

		}

		#log {
			bottom: 0px;
			right: 0px;
			width: 40%;
			height: 50%;

		button {
			height: 51px;
			margin: 0px;

			border-right: 1px solid #6a6969;

			padding: 0px 10px 0px 10px;
		}

		.menu {
			width: 100%;
			position: absolute;
			top: 0px;
			left: 0px;
		}

		#input {
			float: left;
			padding: 15px;
		}
	</style>
</head>

<body>
	<div class="menu">
		<button onclick="dis()">Disassemble as hex</button>
		<button onclick="assemble()">Assemble</button>
		<button onclick="execute()">Execute</button>
		<button onclick="assemble(); execute()">Assemble + Execute</button>
		<button onclick="prettify()">Format hex</button>
		
		<div id="input">Base address: <input type="text" onkeyup="baseAddr = this.value" value="0x10000"></div>
	</div>

	<textarea spellcheck="false" id="bytes" placeholder="Input bytes here"></textarea>
	<textarea onkeydown="if(event.keyCode===9){var v=this.value,s=this.selectionStart,e=this.selectionEnd;this.value=v.substring(0, s)+'\t'+v.substring(e);this.selectionStart=this.selectionEnd=s+1;return false;}" spellcheck="false" id="asm" placeholder="Input asm here"></textarea>
	<textarea spellcheck="false" id="log"></textarea>
</body>
<script src="lib.js"></script>
<script>
var asm = document.getElementById("asm");
var bytes = document.getElementById("bytes");
var log_ = document.getElementById("log");

asm.value = 
`// Arm preprocessor test
.macro HELLO_WORLD
	.ascii "Hello, World"
.endm

b string_end
string:
	HELLO_WORLD
	.byte 0
	.align 4
string_end:

// Store address of string in r0
adr r0, string`;

baseAddr = "0x10000";

log_.value = "Stupid reverse engineering tool v1\n";
log_.value += "Running Capstone ARM, Unicorn-arm\n";
log_.value += "You can use python like hex() and chr() functions in the JS console.\n"

function log(t) {
	log_.value += t + "\n";
}

function convertHex(text) {
	ret = [];

	text = text.replace(/0x/g, "");
	re = text.matchAll(/([0-9A-Fa-f]+)/g);
	for (i of re) {
		ret.push(parseInt(i[1], 16));
	}

	return ret;
}

function prettify() {
	var text = bytes.value;
	bytes.value = "";

	var code = convertHex(text);
	for (var i = 0; i < code.length; i++) {
		var hex = code[i].toString(16);
		if (hex.length == 1) {
			bytes.value += "0";
		}
		
		bytes.value += hex;
	
		if (i != 0 && !((i + 1) % 4)) {
			bytes.value += "\n";
		} else {
			bytes.value += " ";
		}
	}
}

function dis() {
	byte = convertHex(bytes.value)
	asm.value = "";

	if (bytes.length < 4) {
		log("Not enough bytes from parser");
		return;
	}

	var offset = baseAddr;
	var d = new cs.Capstone(cs.ARCH_ARM, cs.MODE_LITTLE_ENDIAN);
	try {
		var instructions = d.disasm(byte, offset);
		instructions.forEach(function (instr) {
			asm.value += instr.mnemonic + " " + instr.op_str + "\n";
		});
	} catch (e) {
		log(e);
		return;
	}

	try {
		d.close();
	} catch (e) {
		return;
	}
}

function assemble() {
	bytes.value = "";
	var a = new ks.Keystone(ks.ARCH_ARM, ks.MODE_LITTLE_ENDIAN);

	var code;
	try {
		code = a.asm(asm.value, baseAddr);
	} catch (err) {
		log(err);
		return;
	}

	for (var i = 0; i < code.length; i++) {
		bytes.value += code[i].toString(16) + " ";
	}

	a.close();

	prettify();
}

function execute() {
	var code = convertHex(bytes.value);
	var e = new uc.Unicorn(uc.ARCH_ARM, uc.MODE_ARM);
	e.mem_map(eval(baseAddr), 0x10000, uc.PROT_ALL);
	e.mem_write(eval(baseAddr), code);
	
	try {
		e.emu_start(eval(baseAddr), eval(baseAddr) + code.length + 0x100, 0, 0);
	} catch (err) {
		log(err);
	}

	for (var i = 1; i < 10; i++) {
		log("R" + i + ":\t0x" +
			(e.reg_read_i32(uc["ARM_REG_R" + i]) >>> 0).toString(16)) >> 0;
	}

	var r0 = e.reg_read_i32(uc.ARM_REG_R0);
	log("r0 return value: " + (r0 >>> 0).toString(16));

	try {
		var returnString = e.mem_read(r0, 100);
		
		var i;
		for (i = 0; returnString[i] != 0; i++);
		
		returnString = returnString.slice(0, i);
		
		try {
			log("Return string: " + String.fromCharCode.apply(null, returnString));
		} catch {
			console.log("No string");
		}
	} catch (e) {
		//console.log(e);
	}

	log_.scrollTop = log_.scrollHeight;
}
</script>
</html>
